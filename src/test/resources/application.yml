spring:
  config:
    import: optional:file:.env.development[.properties]
  data:
    redis:
      host: ${redisHost}
      port: ${redisPort}
  datasource:
    username: ${dbUserName}
    password: ${dbPassword}
    url: jdbc:mysql://localhost:3306/${dbName}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # HikariCP Connection Pool Size 최적화 가이드
      # 100과 같이 과도하게 크게 설정하면 안 되는 이유:
      # 1. 컨텍스트 스위칭 비용: 스레드 전환 오버헤드로 인한 CPU 성능 저하
      # 2. DB 병목: DB 커넥션 생성/유지 비용 및 락(Lock) 경합 증가
      # 3. 권장 공식: ((CPU Core * 2) + Disk Count) 기준 산정
      # 결론: 작은 값으로 시작하여 모니터링 및 부하 테스트를 통해 최적값 도출
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: false
    validate-on-migrate: true
    baseline-on-migrate: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-name: Google
            client-id: ${oauthClientId}
            client-secret: ${oauthClientSecretKey}
            scope:
              - email
custom:
  baseUrl: http://localhost:3000/
  jwt:
    payloads:
      issuer: wjdtn747@naver.com
      subjectAccessToken: access-token
      subjectRefreshToken: refresh-token
      audiance: service-user
    secrets:
      secretKey: ${jwtSecretKey}
      vanillaKey: ${vanillaKey}
    validations:
      access: 900000
      refresh: 1209600000

